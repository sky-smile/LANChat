version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: lanchat-postgres
    environment:
      POSTGRES_DB: lanchat
      POSTGRES_USER: lanchat
      POSTGRES_PASSWORD: lanchat123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lanchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API 服务
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lanchat-api
    environment:
      DATABASE_URL: postgres://lanchat:lanchat123@postgres:5432/lanchat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      UPLOAD_DIR: /app/uploads
      RUST_LOG: info,lanchat_api=debug
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx 反向代理（可选，生产环境使用）
  nginx:
    image: nginx:alpine
    container_name: lanchat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./client/dist:/usr/share/nginx/html
    depends_on:
      - api

  # TURN/STUN 服务器（WebRTC 语音通话）
  coturn:
    image: coturn/coturn:latest
    container_name: lanchat-coturn
    environment:
      DETECT_EXTERNAL_IP: yes
      DETECT_RELAY_IP: yes
      TURN_USERNAME: ${TURN_USERNAME:-lanchat}
      TURN_PASSWORD: ${TURN_PASSWORD:-turn_password_change_me}
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      # TURN relay 端口范围
      - "49152-49200:49152-49200/udp"
    volumes:
      - turn_data:/var/lib/turn
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-T", "-u", "${TURN_USERNAME:-lanchat}", "-w", "${TURN_PASSWORD:-turn_password_change_me}", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  turn_data:
  redis_data:
  uploads_data:
